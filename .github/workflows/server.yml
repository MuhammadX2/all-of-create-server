name: Minecraft Server

on:
  workflow_dispatch:

concurrency:
  group: minecraft-server
  cancel-in-progress: true

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 1

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install screen
        run: sudo apt-get install -y screen

      - name: Add SWAP Memory
        run: |
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "=== Memory Info ==="
          free -h

      - name: Restore world
        uses: actions/cache/restore@v4
        with:
          path: |
            world
            world_nether
            world_the_end
            banned-players.json
            banned-ips.json
            ops.json
            whitelist.json
          key: mc-world-save-${{ github.run_number }}
          restore-keys: |
            mc-world-save-

      - name: Check world
        run: |
          if [ -d "world" ]; then
            SIZE=$(du -sh world/ | cut -f1)
            echo "World restored! Size: $SIZE"
          else
            echo "No world found. Fresh start."
          fi

      # ✅ تم التغيير: من Fabric إلى NeoForge 21.1.228 لـ Minecraft 1.21.1
      - name: Install NeoForge
        run: |
          wget -q https://maven.neoforged.net/releases/net/neoforged/neoforge/21.1.228/neoforge-21.1.228-installer.jar -O neoforge-installer.jar
          java -jar neoforge-installer.jar --install-server .
          echo "eula=true" > eula.txt
          echo "=== NeoForge installed ==="
          ls *.jar run.sh 2>/dev/null || true

      - name: Copy modpack files
        run: |
          cp -r mods/ . 2>/dev/null || true
          cp -r config/ . 2>/dev/null || true
          cp -r defaultconfigs/ . 2>/dev/null || true
          cp -r moonlight-global-datapacks/ . 2>/dev/null || true
          cp -r patchouli_books/ . 2>/dev/null || true
          cp -r data/ . 2>/dev/null || true
          cp -r bivrik/ . 2>/dev/null || true

      - name: Check mods
        run: |
          echo "=== Mods count ==="
          ls mods/*.jar 2>/dev/null | wc -l

      - name: Configure server
        run: |
          echo "server-port=25565" > server.properties
          echo "gamemode=survival" >> server.properties
          echo "difficulty=hard" >> server.properties
          echo "max-players=5" >> server.properties
          echo "view-distance=6" >> server.properties
          echo "simulation-distance=5" >> server.properties
          echo "allow-flight=true" >> server.properties
          echo "pvp=true" >> server.properties
          echo "online-mode=false" >> server.properties
          echo "spawn-protection=0" >> server.properties
          echo "enable-command-block=true" >> server.properties
          echo "op-permission-level=4" >> server.properties
          echo "function-permission-level=4" >> server.properties
          echo "motd=Medieval MC Server" >> server.properties
          echo "prevent-proxy-connections=false" >> server.properties

      - name: Start Playit
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
        run: |
          curl -L -o playit https://github.com/playit-cloud/playit-agent/releases/download/v0.15.26/playit-linux-amd64
          chmod +x playit
          echo "secret_key = \"$PLAYIT_SECRET\"" > playit.toml
          PLAYIT_SECRET_KEY="$PLAYIT_SECRET" ./playit > playit.log 2>&1 &
          sleep 20
          cat playit.log | tail -5

      # ✅ تم التغيير: NeoForge يعمل عبر run.sh بدلاً من fabric-server.jar
      - name: Start Minecraft Server
        run: |
          chmod +x run.sh
          screen -dmS mc bash run.sh nogui

          echo "============================================"
          echo "  Waiting for server to start..."
          echo "============================================"

          TIMEOUT=1500
          ELAPSED=0
          while ! grep -q "Done (" logs/latest.log 2>/dev/null; do
            sleep 20
            ELAPSED=$((ELAPSED + 20))
            if [ -f "logs/latest.log" ]; then
              echo "--- [$((ELAPSED/60))m] ---"
              tail -1 logs/latest.log
            fi
            if ! screen -list | grep -q mc; then
              echo "=== SERVER CRASHED ==="
              tail -80 logs/latest.log 2>/dev/null
              exit 1
            fi
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "=== TIMEOUT ==="
              tail -80 logs/latest.log 2>/dev/null
              exit 1
            fi
          done

          echo "========================================="
          echo "  SERVER IS RUNNING!"
          echo "========================================="

      - name: Give OP and Keep Alive
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
        run: |
          sleep 120

          screen -S mc -X stuff "op MustafaX$(printf '\r')"
          sleep 10
          screen -S mc -X stuff "op muhammad12000$(printf '\r')"
          sleep 10
          screen -S mc -X stuff "op AbbasMaster$(printf '\r')"
          sleep 10

          TOTAL=0
          while screen -list | grep -q mc; do
            sleep 300
            TOTAL=$((TOTAL + 300))
            H=$((TOTAL / 3600))
            M=$(( (TOTAL % 3600) / 60 ))
            echo "Saving... (${H}h ${M}m)"
            screen -S mc -X stuff "save-all$(printf '\r')"

            if ! pgrep -x "playit" > /dev/null; then
              echo "Playit died! Restarting..."
              PLAYIT_SECRET_KEY="$PLAYIT_SECRET" ./playit > playit.log 2>&1 &
              sleep 10
              echo "Playit restarted!"
            else
              echo "Playit is running OK"
            fi

            if [ $TOTAL -ge 20400 ]; then
              echo "Stopping safely..."
              screen -S mc -X stuff "save-all$(printf '\r')"
              sleep 15
              screen -S mc -X stuff "stop$(printf '\r')"
              sleep 30
              break
            fi
          done

          echo "=== SERVER STOPPED ==="
          echo "=== CRASH REPORT ==="
          cat crash-reports/*.txt 2>/dev/null || echo "No crash report"
          echo "=== LAST 50 LINES ==="
          tail -50 logs/latest.log 2>/dev/null

      - name: Save world to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            world
            world_nether
            world_the_end
            banned-players.json
            banned-ips.json
            ops.json
            whitelist.json
          key: mc-world-save-${{ github.run_number }}
